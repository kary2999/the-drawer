<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗和远方·总抽屉 — POETRY & DISTANCE</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg: #0a0a0c; --bg-2: #15151a; --bg-3: #1a1a20; --paper: #1f1f24;
  --ink: #f5f1e8; --ink-2: #c4bca8; --mute: #6b6258; --line: #2a2a30;
  --gold: #c9a86c; --red: #d94f4f;
  --serif: "Noto Serif JP", "Songti SC", "Hiragino Mincho ProN", serif;
  --display: "Cormorant Garamond", "Times New Roman", serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--ink);
  font-family: var(--serif); letter-spacing: 0.03em;
  height: 100vh; overflow: hidden;
}

.app {
  display: grid;
  grid-template-columns: 340px 1fr;
  grid-template-rows: 56px 1fr;
  grid-template-areas: "topbar topbar" "left main";
  height: 100vh;
}

.topbar {
  grid-area: topbar; background: var(--bg);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.brand {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--display); font-style: italic;
  font-size: 14px; letter-spacing: 0.4em; color: var(--gold);
}
.brand .seal {
  width: 32px; height: 32px;
  background: var(--red); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-weight: 500; font-family: var(--serif); font-style: normal;
  font-size: 14px; letter-spacing: 0; transform: rotate(-3deg);
}
.topbar-actions { display: flex; align-items: center; gap: 18px; }
.status {
  background: transparent; border: 1px solid var(--line);
  padding: 6px 14px; font-size: 12px; color: var(--gold);
  max-width: 380px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: 0.05em;
  font-family: var(--display); font-style: italic;
}
.btn {
  background: transparent; color: var(--gold);
  border: 1px solid var(--gold);
  padding: 6px 14px; font-size: 11px;
  letter-spacing: 0.4em; cursor: pointer;
  font-family: var(--display); font-style: italic;
  text-transform: uppercase; transition: all 0.2s;
}
.btn:hover { background: var(--gold); color: var(--bg); }
.vol {
  font-size: 10px; color: var(--mute);
  letter-spacing: 0.5em; text-transform: uppercase;
}

.left {
  grid-area: left; background: var(--bg-2);
  border-right: 1px solid var(--line);
  overflow-y: auto;
}

#map {
  width: 100%; height: 280px;
  background: var(--bg-3); position: relative;
}
.map-overlay {
  position: absolute; top: 10px; left: 12px; z-index: 500;
  font-family: var(--display); font-style: italic;
  font-size: 10px; letter-spacing: 0.4em;
  color: var(--gold); pointer-events: none;
}
.map-overlay .vol-tag {
  display: block; font-size: 9px; color: var(--mute);
  letter-spacing: 0.5em; margin-top: 3px;
}

.pin-marker {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--gold); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  border: 2px solid var(--bg);
  font-family: var(--display); cursor: pointer;
  transition: transform 0.15s, background 0.15s;
}
.pin-marker.active {
  background: var(--red); transform: scale(1.2); color: var(--ink);
}
.pin-marker:hover { transform: scale(1.15); }
.leaflet-popup-content-wrapper {
  background: var(--paper); color: var(--ink);
  border: 1px solid var(--gold); border-radius: 0;
}
.leaflet-popup-content { margin: 10px 14px; font-family: var(--serif); }
.leaflet-popup-content .pp-num {
  font-size: 10px; color: var(--gold);
  letter-spacing: 0.4em; font-family: var(--display); font-style: italic;
}
.leaflet-popup-content .pp-name {
  font-size: 14px; color: var(--ink); margin-top: 2px; letter-spacing: 0.04em;
}
.leaflet-popup-tip { background: var(--paper); border: 1px solid var(--gold); }

.cat-block {
  border-bottom: 1px solid var(--line);
  padding: 12px 0 14px;
}
.cat-block:last-child { border-bottom: none; }
.cat-head {
  padding: 0 18px 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.cat-head .name {
  font-size: 9px; letter-spacing: 0.5em;
  color: var(--gold); text-transform: uppercase;
  font-family: var(--display); font-style: italic;
}
.cat-head .count {
  font-size: 11px; color: var(--mute);
  font-family: var(--display); font-style: italic;
}

.row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px; cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.15s, border-left-color 0.15s;
}
.row:hover { background: rgba(201,168,108,0.06); }
.row.active {
  background: var(--paper); border-left-color: var(--gold);
}
.row .badge {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--paper); color: var(--gold);
  border: 1px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; font-family: var(--display);
  flex-shrink: 0;
}
.row.active .badge {
  background: var(--gold); color: var(--bg);
}
.row.pinned .badge::before {
  content: "★"; position: absolute; transform: translate(13px, -10px);
  font-size: 10px; color: var(--red);
}
.row .meta {
  flex: 1; min-width: 0;
}
.row .meta .title {
  font-size: 13px; color: var(--ink);
  letter-spacing: 0.04em; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.row .meta .region {
  font-size: 10px; color: var(--mute);
  font-family: var(--display); font-style: italic;
  margin-top: 1px; letter-spacing: 0.1em;
}
.row .geo-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); flex-shrink: 0; opacity: 0.6;
}
.row .geo-dot.none { opacity: 0; }

.avatars-row {
  padding: 6px 14px;
  display: flex; flex-wrap: wrap; gap: 14px;
}
.avatar {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  cursor: pointer; width: 60px;
  transition: transform 0.15s;
}
.avatar:hover { transform: translateY(-2px); }
.avatar .ring {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--paper); color: var(--gold);
  border: 1px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 400;
  transition: all 0.2s;
}
.avatar.active .ring { background: var(--gold); color: var(--bg); }
.avatar .label {
  font-size: 10px; color: var(--ink-2);
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 60px;
  text-align: center; letter-spacing: 0.05em;
}
.avatar.active .label { color: var(--gold); }

.main {
  grid-area: main; background: var(--bg-3);
  position: relative; overflow: hidden;
}
.iframe-host { width: 100%; height: 100%; border: none; background: #fff; }

.iframe-error {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg-3); padding: 48px; text-align: center;
}
.iframe-error h2 {
  font-size: 28px; font-weight: 400;
  margin-bottom: 14px; color: var(--ink);
}
.iframe-error h2 em {
  font-family: var(--display); font-style: italic; color: var(--gold);
}
.iframe-error p {
  font-size: 14px; color: var(--ink-2);
  max-width: 420px; line-height: 2;
  font-family: var(--display); font-style: italic;
}

.loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(10,10,12,0.85);
  pointer-events: none; z-index: 5;
}
.loading.hidden { display: none; }
.loading .spinner {
  width: 36px; height: 36px;
  border: 1px solid var(--line);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.left::-webkit-scrollbar { width: 6px; }
.left::-webkit-scrollbar-track { background: var(--bg-2); }
.left::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px 50vh 50vh;
    grid-template-areas: "topbar" "left" "main";
  }
  .status { display: none; }
}
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="seal">远</div>
      <span>POETRY &amp; DISTANCE</span>
    </div>
    <div class="topbar-actions">
      <div class="status" id="status">— pick a place —</div>
      <button class="btn" onclick="location.reload()">home</button>
      <span class="vol">VOL. 01</span>
    </div>
  </header>

  <aside class="left">
    <div id="map">
      <div class="map-overlay">
        JAPAN · 日本
        <span class="vol-tag">11 ISSUES · UPDATED DAILY</span>
      </div>
    </div>
    <div id="side-panel"></div>
  </aside>

  <main class="main">
    <div id="main-inner" style="position:relative;height:100%;">
      <div class="iframe-error">
        <h2><em>诗 与</em> 远方</h2>
        <p>点左边任意一项<br>地图上的 pin 或下方列表都可以</p>
      </div>
    </div>
  </main>
</div>

<script>
let map, allItems = [], markers = {}, currentItem = null;

fetch('data/sites.json').then(r => r.json()).then(data => {
  initMap(data);
  initSidePanel(data);
  const firstItem = data.categories[0].items[0];
  if (firstItem) setTimeout(() => loadItem(firstItem, true), 200);
});

function initMap(data) {
  map = L.map('map', {
    center: [35, 137], zoom: 5, minZoom: 4,
    zoomControl: false, attributionControl: false,
    scrollWheelZoom: true,
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
    subdomains: 'abcd', maxZoom: 19,
    attribution: '© OSM © CartoDB',
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.control.attribution({ position: 'bottomright', prefix: '' }).addTo(map);

  const geoCat = data.categories.find(c => c.id === 'japan' || c.id === 'yuanfang');
  geoCat.items.forEach(it => {
    if (!it.lat) return;
    const icon = L.divIcon({
      className: 'pin-marker-wrap',
      html: `<div class="pin-marker" data-id="${it.id}">${it.no}</div>`,
      iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -16],
    });
    const m = L.marker([it.lat, it.lng], { icon }).addTo(map);
    m.bindPopup(`<div class="pp-num">NO. ${it.no} · ${it.region}</div><div class="pp-name">${it.title_zh}</div>`);
    m.on('click', () => loadItem(it));
    markers[it.id] = m;
  });
}

function initSidePanel(data) {
  const panel = document.getElementById('side-panel');
  data.categories.forEach(cat => {
    cat.items.forEach(it => allItems.push(it));
    const block = document.createElement('div');
    block.className = 'cat-block';
    block.innerHTML = `<div class="cat-head"><span class="name">${cat.name_zh} · ${cat.name_en}</span><span class="count">${cat.items.length}</span></div>`;

    if (cat.id === 'japan' || cat.id === 'yuanfang') {
      // 11 个全部以 row 显示（包含全境）
      cat.items.forEach(it => {
        const row = document.createElement('div');
        row.className = 'row' + (it.pinned ? ' pinned' : '');
        row.dataset.id = it.id;
        row.innerHTML = `
          <div class="badge" style="position:relative">${it.no}</div>
          <div class="meta">
            <div class="title">${it.title_zh}</div>
            <div class="region">${it.region}</div>
          </div>
          <div class="geo-dot ${it.lat ? '' : 'none'}"></div>
        `;
        row.addEventListener('click', () => loadItem(it));
        block.appendChild(row);
      });
    } else {
      // 学习 / 旅游 — 头像
      const ar = document.createElement('div');
      ar.className = 'avatars-row';
      cat.items.forEach(it => {
        const a = document.createElement('div');
        a.className = 'avatar';
        a.dataset.id = it.id;
        a.innerHTML = `<div class="ring">${it.short || it.title_zh.charAt(0)}</div><div class="label">${it.title_zh}</div>`;
        a.addEventListener('click', () => loadItem(it));
        ar.appendChild(a);
      });
      block.appendChild(ar);
    }
    panel.appendChild(block);
  });
}

function loadItem(item, skipFly) {
  currentItem = item;
  document.getElementById('status').textContent = item.title_zh + (item.title_en ? ' · ' + item.title_en : '');

  document.querySelectorAll('.row').forEach(r => r.classList.toggle('active', r.dataset.id === item.id));
  document.querySelectorAll('.avatar').forEach(a => a.classList.toggle('active', a.dataset.id === item.id));
  document.querySelectorAll('.pin-marker').forEach(p => p.classList.remove('active'));

  if (item.lat && markers[item.id]) {
    const pin = document.querySelector(`.pin-marker[data-id="${item.id}"]`);
    if (pin) pin.classList.add('active');
    if (!skipFly) {
      map.flyTo([item.lat, item.lng], 8, { duration: 0.7 });
      markers[item.id].openPopup();
    }
  } else if (!skipFly && map) {
    map.flyTo([35, 137], 5, { duration: 0.7 });
  }

  const inner = document.getElementById('main-inner');
  inner.innerHTML = '';

  if (item.embed_safe === false) {
    inner.innerHTML = `<div class="iframe-error"><h2>${item.title_zh}<br><em>暂不支持嵌入预览</em></h2><p>这个站点的安全策略拒绝了 iframe。</p></div>`;
    return;
  }

  const loading = document.createElement('div');
  loading.className = 'loading';
  loading.innerHTML = '<div class="spinner"></div>';
  inner.appendChild(loading);

  const iframe = document.createElement('iframe');
  iframe.className = 'iframe-host';
  iframe.src = item.url;
  iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
  iframe.setAttribute('loading', 'eager');
  let loaded = false;
  iframe.onload = () => {
    loaded = true; loading.classList.add('hidden');
    if (!window.__warmedUp) { window.__warmedUp = true; setTimeout(warmupOthers, 1500); }
  };
  inner.appendChild(iframe);

  setTimeout(() => {
    if (!loaded) {
      loading.classList.add('hidden'); iframe.remove();
      inner.innerHTML = `<div class="iframe-error"><h2>${item.title_zh}<br><em>暂时未能加载</em></h2><p>站点拒绝嵌入或正在响应中。</p></div>`;
    }
  }, 6000);
}

function warmupOthers() {
  const origins = new Set();
  allItems.forEach(it => {
    if (it.embed_safe === false || !it.url) return;
    try { origins.add(new URL(it.url).origin); } catch (e) {}
  });
  origins.forEach(origin => {
    const pc = document.createElement('link');
    pc.rel = 'preconnect'; pc.href = origin; pc.crossOrigin = '';
    document.head.appendChild(pc);
    const dns = document.createElement('link');
    dns.rel = 'dns-prefetch'; dns.href = origin;
    document.head.appendChild(dns);
  });
}
</script>
</body>
</html>
