<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗和远方·总抽屉 — POETRY & DISTANCE</title>
<style>
:root {
  --bg: #0a0a0c;
  --bg-2: #15151a;
  --bg-3: #1a1a20;
  --paper: #1f1f24;
  --ink: #f5f1e8;
  --ink-2: #c4bca8;
  --mute: #6b6258;
  --line: #2a2a30;
  --gold: #c9a86c;
  --red: #d94f4f;
  --serif: "Noto Serif JP", "Songti SC", "Hiragino Mincho ProN", "Source Han Serif", serif;
  --display: "Cormorant Garamond", "Times New Roman", serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  line-height: 1.85;
  letter-spacing: 0.03em;
  height: 100vh;
  overflow: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.04;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: 56px 1fr;
  grid-template-areas: "topbar topbar" "sidebar main";
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* MASTHEAD */
.topbar {
  grid-area: topbar;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.brand {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--display); font-style: italic;
  font-size: 14px; letter-spacing: 0.4em; color: var(--gold);
}
.brand .seal {
  width: 32px; height: 32px;
  background: var(--red); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-weight: 500; font-family: var(--serif); font-style: normal;
  font-size: 14px; letter-spacing: 0; transform: rotate(-3deg);
}
.topbar-actions {
  display: flex; align-items: center; gap: 18px;
}
.status {
  background: transparent;
  border: 1px solid var(--line);
  padding: 6px 14px;
  font-size: 12px; color: var(--ink-2);
  max-width: 380px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: 0.05em;
  font-family: var(--display); font-style: italic;
}
.btn {
  background: transparent; color: var(--gold);
  border: 1px solid var(--gold);
  padding: 6px 14px; font-size: 11px;
  letter-spacing: 0.4em; cursor: pointer;
  font-family: var(--display); font-style: italic;
  text-transform: uppercase; transition: all 0.2s;
}
.btn:hover { background: var(--gold); color: var(--bg); }
.vol {
  font-size: 10px; color: var(--mute);
  letter-spacing: 0.5em; text-transform: uppercase;
}

/* SIDEBAR */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-2);
  border-right: 1px solid var(--line);
  overflow-y: auto;
  padding: 16px 0;
}
.cat-block {
  border-bottom: 1px solid var(--line);
  padding: 12px 0;
}
.cat-block:last-child { border-bottom: none; }
.cat-header {
  padding: 6px 22px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.cat-header .name {
  font-size: 10px; letter-spacing: 0.6em;
  color: var(--gold); text-transform: uppercase;
  font-family: var(--display); font-style: italic;
}
.cat-header .count {
  font-size: 11px; color: var(--mute);
  font-family: var(--display); font-style: italic;
}

.item {
  padding: 14px 22px;
  cursor: pointer;
  border-left: 2px solid transparent;
  border-bottom: 1px solid var(--line);
  position: relative;
  transition: background 0.15s, border-left-color 0.15s;
}
.item:last-child { border-bottom: none; }
.item:hover { background: var(--bg-3); }
.item.active {
  background: var(--paper);
  border-left-color: var(--gold);
}
.item .num-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 9px; letter-spacing: 0.4em; color: var(--mute);
  text-transform: uppercase; margin-bottom: 6px;
  font-family: var(--display); font-style: italic;
}
.item .embed-mark {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; background: var(--gold);
}
.item .embed-mark.warn { background: var(--red); }
.item .title {
  font-size: 15px; font-weight: 400;
  letter-spacing: 0.04em; color: var(--ink);
  margin-bottom: 4px; line-height: 1.4;
}
.item .tagline {
  font-size: 12px; color: var(--ink-2);
  font-family: var(--display); font-style: italic;
  letter-spacing: 0.05em; line-height: 1.5;
}
.item .tags {
  margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap;
}
.item .tag {
  font-size: 9px; letter-spacing: 0.2em;
  padding: 2px 6px; border: 1px solid var(--line);
  color: var(--mute); text-transform: uppercase;
}

/* MAIN */
.main {
  grid-area: main;
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}
.main-inner {
  flex: 1; position: relative;
  background: var(--bg-3); overflow: hidden;
}
.iframe-host {
  width: 100%; height: 100%;
  border: none; background: #fff;
}

/* WELCOME */
.welcome {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg-3);
  padding: 48px; text-align: center;
}
.welcome::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background-image: radial-gradient(circle at 30% 20%, rgba(201,168,108,0.08), transparent 50%),
                    radial-gradient(circle at 70% 80%, rgba(217,79,79,0.04), transparent 50%);
}
.welcome > * { position: relative; z-index: 1; }
.welcome .issue-tag {
  display: inline-block;
  padding: 5px 14px;
  border: 1px solid var(--gold);
  font-size: 10px; letter-spacing: 0.6em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 32px;
  font-family: var(--display); font-style: italic;
}
.welcome h1 {
  font-size: clamp(64px, 9vw, 128px);
  font-weight: 400; line-height: 0.92;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 12px;
}
.welcome h1 em {
  font-family: var(--display);
  font-style: italic;
  color: var(--gold);
  font-weight: 400;
}
.welcome .deck {
  display: grid; grid-template-columns: auto 1fr;
  gap: 32px; align-items: start;
  margin-top: 32px; max-width: 720px;
}
.welcome .deck-rule {
  width: 60px; height: 1px; background: var(--gold); margin-top: 14px;
}
.welcome .deck p {
  font-size: 16px; line-height: 2;
  color: var(--ink-2); text-align: left;
}
.welcome .deck p em {
  color: var(--gold); font-style: italic;
}
.welcome .stats {
  display: flex; gap: 32px; margin-top: 48px;
}
.welcome .stat {
  text-align: center;
}
.welcome .stat .num {
  font-family: var(--display); font-style: italic;
  font-size: 56px; color: var(--gold); line-height: 1;
  letter-spacing: -0.02em;
}
.welcome .stat .label {
  font-size: 10px; color: var(--mute);
  letter-spacing: 0.5em; margin-top: 6px;
  text-transform: uppercase;
}
.welcome .hint {
  margin-top: 40px;
  font-size: 11px; color: var(--mute);
  letter-spacing: 0.5em; text-transform: uppercase;
  font-family: var(--display); font-style: italic;
}

/* IFRAME ERROR */
.iframe-error {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg-3); padding: 48px; text-align: center;
}
.iframe-error h2 {
  font-size: 32px; font-weight: 400;
  margin-bottom: 14px; letter-spacing: 0.04em;
  color: var(--ink);
}
.iframe-error h2 em {
  font-family: var(--display); font-style: italic; color: var(--gold);
}
.iframe-error p {
  font-size: 15px; color: var(--ink-2);
  max-width: 420px; line-height: 2;
  font-family: var(--display); font-style: italic;
}

/* LOADING */
.loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(10,10,12,0.85);
  pointer-events: none; z-index: 5;
}
.loading.hidden { display: none; }
.loading .spinner {
  width: 36px; height: 36px;
  border: 1px solid var(--line);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* SCROLLBAR */
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: var(--bg-2); }
.sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px auto 1fr;
    grid-template-areas: "topbar" "sidebar" "main";
  }
  .sidebar { max-height: 28vh; border-right: none; border-bottom: 1px solid var(--line); }
  .status { display: none; }
  .welcome h1 { font-size: 56px; }
  .welcome .deck { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="seal">远</div>
      <span>POETRY &amp; DISTANCE</span>
    </div>
    <div class="topbar-actions">
      <div class="status" id="status">— select an issue —</div>
      <button class="btn" id="home-btn" onclick="location.reload()">home</button>
      <span class="vol">VOL. 01</span>
    </div>
  </header>

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="main-inner" id="main-inner">
      <div class="welcome" id="welcome">
        <div class="issue-tag">Issue 01 · 立夏 · May 2026</div>
        <h1>诗 与 <em>远方</em></h1>
        <div class="deck">
          <div class="deck-rule"></div>
          <div>
            <p>把所有的远方收进一个抽屉。<br>左边点一格，右边就翻一页。</p>
            <p style="margin-top:14px;font-size:13px;color:var(--mute);font-family:var(--display);font-style:italic">A drawer of faraway · curated by kary2999 · updated daily.</p>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="num" id="s-total">15</div><div class="label">Issues</div></div>
          <div class="stat"><div class="num" id="s-cat">3</div><div class="label">Sections</div></div>
          <div class="stat"><div class="num">∞</div><div class="label">Onward</div></div>
        </div>
        <div class="hint">← Pick one from the left</div>
      </div>
    </div>
  </main>
</div>

<script>
let allItems = [];

fetch('data/sites.json').then(r => r.json()).then(data => {
  const sidebar = document.getElementById('sidebar');
  let totalItems = 0;
  data.categories.forEach(cat => {
    totalItems += cat.items.length;
    const block = document.createElement('div');
    block.className = 'cat-block';
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="name">${cat.name_zh} · ${cat.name_en}</span>
      <span class="count">${String(cat.items.length).padStart(2,'0')}</span>
    `;
    block.appendChild(header);
    cat.items.forEach((item, idx) => {
      allItems.push(item);
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = item.id;
      const embedClass = item.embed_safe === false ? 'warn' : '';
      const tagsHtml = (item.tags || []).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('');
      el.innerHTML = `
        <div class="num-row">
          <span class="embed-mark ${embedClass}"></span>
          <span>No. ${String(idx+1).padStart(2,'0')}</span>
        </div>
        <div class="title">${item.title_zh}</div>
        <div class="tagline">"${item.tagline}"</div>
        <div class="tags">${tagsHtml}</div>
      `;
      el.addEventListener('click', () => loadItem(item, el));
      block.appendChild(el);
    });
    sidebar.appendChild(block);
  });
  document.getElementById('s-total').textContent = totalItems;
  document.getElementById('s-cat').textContent = data.categories.length;
});

function loadItem(item, el) {
  document.querySelectorAll('.item').forEach(d => d.classList.remove('active'));
  el.classList.add('active');

  const status = document.getElementById('status');
  status.textContent = item.title_zh + (item.title_en ? ' · ' + item.title_en : '');
  status.style.color = 'var(--gold)';
  status.style.fontStyle = 'italic';

  const inner = document.getElementById('main-inner');
  inner.innerHTML = '';

  if (item.embed_safe === false) {
    inner.innerHTML = `
      <div class="iframe-error">
        <h2>${item.title_zh}<br><em>暂不支持嵌入预览</em></h2>
        <p>这个站点的安全策略拒绝了 iframe。<br>翻翻别的项目吧。</p>
      </div>`;
    return;
  }

  const loading = document.createElement('div');
  loading.className = 'loading';
  loading.innerHTML = '<div class="spinner"></div>';
  inner.appendChild(loading);

  const iframe = document.createElement('iframe');
  iframe.className = 'iframe-host';
  iframe.src = item.url;
  iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
  let loaded = false;
  iframe.onload = () => { loaded = true; loading.classList.add('hidden'); };
  inner.appendChild(iframe);

  setTimeout(() => {
    if (!loaded) {
      loading.classList.add('hidden');
      iframe.remove();
      inner.innerHTML = `
        <div class="iframe-error">
          <h2>${item.title_zh}<br><em>暂时未能加载</em></h2>
          <p>站点拒绝嵌入或正在响应中。<br>翻翻别的项目吧。</p>
        </div>`;
    }
  }, 6000);
}
</script>
</body>
</html>
